sign_in:
  description: Sign in with Sign In App using the configured companion device.
  fields:
    entity_id:
      description: Status sensor entity_id for the companion device.
      example: sensor.signinapp_jane
    entry_id:
      description: Optional config entry id to target a device.
      example: abc123
    site_id:
      description: Override site id for this sign in.
      example: 123
sign_out:
  description: Sign out with Sign In App using the configured companion device.
  fields:
    entity_id:
      description: Status sensor entity_id for the companion device.
      example: sensor.signinapp_jane
    entry_id:
      description: Optional config entry id to target a device.
      example: abc123
    site_id:
      description: Override site id for this sign out.
      example: 123
sign_in_auto:
  description: Automatically sign in based on device zone and configured sites.
  fields:
    entity_id:
      description: Status sensor entity_id for the companion device.
      example: sensor.signinapp_jane
    entry_id:
      description: Optional config entry id to target a device.
      example: abc123
